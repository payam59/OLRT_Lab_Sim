<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Control Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-bold"><i class="fas fa-microchip me-2"></i>Asset Control Center</h2>
            <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="fas fa-plus me-2"></i>Provision Asset
            </button>
        </div>

        <div id="assetGrid" class="row"></div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Provision New Asset</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Asset Name</label>
                        <input type="text" id="name" class="form-control" placeholder="e.g. Temp_Sensor_01">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Asset Category</label>
                        <select id="type" class="form-select">
                            <option value="Temperature">Temperature Sensor</option>
                            <option value="Pressure">Pressure Transmitter</option>
                            <option value="Flow">Flow Meter</option>
                            <option value="Fan">Ventilation Fan</option>
                            <option value="Light">Lighting Control</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Log Filename (.bin)</label>
                        <div class="input-group">
                            <input type="text" id="filename" class="form-control" placeholder="e.g. T_Sensor_01">
                            <span class="input-group-text">.bin</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Protocol</label>
                        <select id="protocol" class="form-select">
                            <option value="modbus">Modbus TCP</option>
                            <option value="dnp3">DNP3</option>
                            <option value="bacnet">BACnet/IP</option>
                        </select>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Address / Index</label>
                            <input type="number" id="addr" class="form-control" value="0">
                        </div>
                        <div class="col">
                            <label class="form-label">Icon</label>
                            <select id="icon" class="form-select">
                                <option value="fa-thermometer-half">Thermometer</option>
                                <option value="fa-fan">Fan</option>
                                <option value="fa-gauge-high">Pressure Gauge</option>
                                <option value="fa-bolt">Electric Meter</option>
                                <option value="fa-lightbulb">Light Switch</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Min Range</label>
                            <input type="number" id="min" class="form-control" value="0">
                        </div>
                        <div class="col">
                            <label class="form-label">Max Range</label>
                            <input type="number" id="max" class="form-control" value="100">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Drift Rate</label>
                        <input type="number" step="0.1" id="drift" class="form-control" value="1.0">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveNewAsset()">Deploy Asset</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-warning">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Reconfigure Asset</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-muted">Asset Name (Unique ID)</label>
                        <input type="text" id="edit_name" class="form-control bg-light" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Asset Category</label>
                        <select id="edit_type" class="form-select">
                            <option value="Temperature">Temperature Sensor</option>
                            <option value="Pressure">Pressure Transmitter</option>
                            <option value="Flow">Flow Meter</option>
                            <option value="Fan">Ventilation Fan</option>
                            <option value="Light">Lighting Control</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Log Filename (.bin)</label>
                        <div class="input-group">
                            <input type="text" id="edit_filename" class="form-control">
                            <span class="input-group-text">.bin</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Protocol Architecture</label>
                        <select id="edit_protocol" class="form-select">
                            <option value="modbus">Modbus TCP</option>
                            <option value="dnp3">DNP3</option>
                            <option value="bacnet">BACnet/IP</option>
                        </select>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Address</label>
                            <input type="number" id="edit_addr" class="form-control">
                        </div>
                        <div class="col">
                            <label class="form-label">Icon</label>
                            <select id="edit_icon" class="form-select">
                                <option value="fa-thermometer-half">Thermometer</option>
                                <option value="fa-fan">Fan</option>
                                <option value="fa-gauge-high">Pressure Gauge</option>
                                <option value="fa-bolt">Electric Meter</option>
                                <option value="fa-lightbulb">Light Switch</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Min Range</label>
                            <input type="number" id="edit_min" class="form-control">
                        </div>
                        <div class="col">
                            <label class="form-label">Max Range</label>
                            <input type="number" id="edit_max" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Drift Rate</label>
                        <input type="number" step="0.1" id="edit_drift" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Discard</button>
                    <button type="button" class="btn btn-warning" onclick="saveAssetEdit()">Apply Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
