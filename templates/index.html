<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Control Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-bold"><i class="fas fa-network-wired me-2"></i>Asset Control Center</h2>
            <button class="btn btn-primary shadow-sm px-4" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="fas fa-plus me-2"></i>Provision Asset
            </button>
        </div>

        <div id="assetGrid" class="row"></div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Provision New Asset</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="small fw-bold">Asset Name</label>
                    <input type="text" id="name" class="form-control mb-2" placeholder="e.g. Tunnel_Fan_01">

                    <div class="row mb-2">
                        <div class="col">
                            <label class="small fw-bold">Category</label>
                            <select id="type" class="form-select">
                                <option value="Temp">Temperature</option>
                                <option value="Pressure">Pressure</option>
                                <option value="Light">Lighting</option>
                                <option value="Fan">Ventilation</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="small fw-bold">Sub-Type</label>
                            <select id="sub_type" class="form-select" onchange="toggleFields('')">
                                <option value="Analog">Analog (Continuous)</option>
                                <option value="Digital">Digital (Binary)</option>
                            </select>
                        </div>
                    </div>

                    <label class="small fw-bold">Protocol</label>
                    <select id="protocol" class="form-select mb-2">
                        <option value="bacnet">BACnet/IP</option>
                        <option value="modbus">Modbus TCP</option>
                    </select>

                    <div id="analog_fields">
                        <div class="row mb-2">
                            <div class="col">
                                <label class="small">Min Range</label>
                                <input type="number" id="min" class="form-control" value="0">
                            </div>
                            <div class="col">
                                <label class="small">Max Range</label>
                                <input type="number" id="max" class="form-control" value="100">
                            </div>
                        </div>
                        <label class="small">Drift Rate</label>
                        <input type="number" step="0.1" id="drift" class="form-control mb-2" value="0.5">
                    </div>

                    <div id="digital_fields" style="display:none;">
                        <label class="small fw-bold mb-1">Logic Configuration</label>
                        <select id="logic_state" class="form-select mb-2">
                            <option value="1">Normally Open (N.O.) - High Trigger</option>
                            <option value="0">Normally Closed (N.C.) - Low Trigger</option>
                        </select>
                    </div>

                    <div class="row mb-2">
                        <div class="col">
                            <label class="small fw-bold">Port/Instance ID</label>
                            <input type="number" id="addr" class="form-control" value="1">
                        </div>
                        <div class="col">
                            <label class="small fw-bold">UI Icon</label>
                            <select id="icon" class="form-select">
                                <option value="fa-thermometer-half">Thermometer</option>
                                <option value="fa-lightbulb">Lightbulb</option>
                                <option value="fa-fan">Fan</option>
                                <option value="fa-gauge-high">Gauge</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-dark text-white p-2 rounded small mt-3">
                        <div class="fw-bold mb-1 text-info"><i class="fas fa-server me-1"></i>BACnet Infrastructure</div>
                        <div class="row">
                            <div class="col">UDP Port: <input type="number" id="bac_port" class="form-control form-control-sm bg-secondary text-white border-0" value="47808"></div>
                            <div class="col">Device ID: <input type="number" id="bac_id" class="form-control form-control-sm bg-secondary text-white border-0" value="1234"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary w-100 fw-bold" onclick="saveNewAsset()">Deploy Asset</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-warning">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Reconfigure Asset</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="small fw-bold text-muted">Unique Identifier (Read-Only)</label>
                    <input type="text" id="edit_name" class="form-control mb-2 bg-light" readonly>

                    <div class="row mb-2">
                        <div class="col">
                            <label class="small fw-bold">Category</label>
                            <select id="edit_type" class="form-select">
                                <option value="Temp">Temperature</option>
                                <option value="Pressure">Pressure</option>
                                <option value="Light">Lighting</option>
                                <option value="Fan">Ventilation</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="small fw-bold">Sub-Type</label>
                            <select id="edit_sub_type" class="form-select" onchange="toggleFields('edit_')">
                                <option value="Analog">Analog</option>
                                <option value="Digital">Digital</option>
                            </select>
                        </div>
                    </div>

                    <label class="small fw-bold">Target Protocol</label>
                    <select id="edit_protocol" class="form-select mb-2">
                        <option value="bacnet">BACnet/IP</option>
                        <option value="modbus">Modbus TCP</option>
                    </select>

                    <div id="edit_analog_fields">
                        <div class="row mb-2">
                            <div class="col"><label class="small">Min</label><input type="number" id="edit_min" class="form-control"></div>
                            <div class="col"><label class="small">Max</label><input type="number" id="edit_max" class="form-control"></div>
                        </div>
                        <label class="small">Drift Rate</label>
                        <input type="number" step="0.1" id="edit_drift" class="form-control mb-2">
                    </div>

                    <div id="edit_digital_fields" style="display:none;">
                        <label class="small fw-bold">Normally Open/Closed</label>
                        <select id="edit_logic_state" class="form-select mb-2">
                            <option value="1">Normally Open</option>
                            <option value="0">Normally Closed</option>
                        </select>
                    </div>

                    <div class="row mb-2">
                        <div class="col"><label class="small fw-bold">Instance Address</label><input type="number" id="edit_addr" class="form-control"></div>
                        <div class="col">
                            <label class="small fw-bold">Icon</label>
                            <select id="edit_icon" class="form-select">
                                <option value="fa-thermometer-half">Temp</option>
                                <option value="fa-lightbulb">Light</option>
                                <option value="fa-fan">Fan</option>
                                <option value="fa-gauge-high">Gauge</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-2">
                        <div class="col"><label class="small">BACnet Port</label><input type="number" id="edit_bac_port" class="form-control form-control-sm"></div>
                        <div class="col"><label class="small">Dev ID</label><input type="number" id="edit_bac_id" class="form-control form-control-sm"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-warning w-100 fw-bold" onclick="saveAssetEdit()">Apply Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
