<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACnet Service Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0"><i class="fas fa-heartbeat me-2"></i>BACnet Service Status</h4>
            <a href="/" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Back</a>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted">BAC0 Installed</h6>
                        <div id="bac0Installed" class="fs-4 fw-bold">-</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted">Running BBMDs</h6>
                        <div id="runningBbmds" class="fs-4 fw-bold">-</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted">Registered Objects</h6>
                        <div id="registeredObjects" class="fs-4 fw-bold">-</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mt-3">
            <div class="card-header bg-white">
                <strong>BBMD Runtime Details</strong>
            </div>
            <div class="card-body">
                <pre id="bbmdStatusDetails" class="mb-0 small bg-light p-3 rounded">Loading...</pre>
            </div>
        </div>

        <div class="card shadow-sm mt-3">
            <div class="card-header bg-white">
                <strong>Modbus Service Status</strong>
            </div>
            <div class="card-body">
                <pre id="modbusStatusDetails" class="mb-0 small bg-light p-3 rounded">Loading...</pre>
            </div>
        </div>
    </div>

    <script>
        async function refreshStatus() {
            const [bacnetRes, modbusRes] = await Promise.all([
                fetch('/api/bacnet/status'),
                fetch('/api/modbus/status')
            ]);
            const bacnet = await bacnetRes.json();
            const modbus = await modbusRes.json();

            document.getElementById('bac0Installed').textContent = bacnet.bac0_installed ? 'Yes' : 'No';
            document.getElementById('bac0Installed').className = bacnet.bac0_installed ? 'fs-4 fw-bold text-success' : 'fs-4 fw-bold text-danger';
            document.getElementById('runningBbmds').textContent = (bacnet.running_bbmd_ids || []).length;
            document.getElementById('registeredObjects').textContent = (bacnet.registered_object_names || []).length;
            document.getElementById('bbmdStatusDetails').textContent = JSON.stringify(bacnet.bbmd_status || {}, null, 2);
            document.getElementById('modbusStatusDetails').textContent = JSON.stringify(modbus || {}, null, 2);
        }

        refreshStatus();
        setInterval(refreshStatus, 5000);
    </script>
</body>
</html>
